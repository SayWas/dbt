airfare_analytics:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'postgres') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'dwh') }}"
      pass: "{{ env_var('POSTGRES_PASSWORD', 'dwh') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'dwh') }}"
      schema: analytics
      threads: 4
      connect_timeout: 10

elementary:
  target: default
  outputs:
    default:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'postgres') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'dwh') }}"
      pass: "{{ env_var('POSTGRES_PASSWORD', 'dwh') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'dwh') }}"
      schema: analytics
      threads: 4
      connect_timeout: 10
